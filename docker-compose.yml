version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tiktok-erp-db
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_dev_2026
      POSTGRES_DB: tiktok_shop_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tiktok-erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
